name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create keystore properties
        run: |
          echo "storeFile=release.keystore" > keystore.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore.properties

      - name: Decode Keystore
        run: echo -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > composeApp/release.keystore

      - name: Build Release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Rename APK
        run: mv composeApp/build/outputs/apk/release/composeApp-release.apk QuickShare-${{ github.ref_name }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: QuickShare-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
